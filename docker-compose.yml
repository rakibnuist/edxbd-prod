version: '3.8'

services:
  web:
    build:
      context: https://github.com/rakibnuist/edxbd-prod.git#main
      dockerfile: Dockerfile
    container_name: edxbd_web
    restart: always
    # Secrets live in a .env file next to this compose file ON THE VPS (never in git).
    env_file:
      - .env
    environment:
      # Use a persistent location for the database inside the container
      - DATABASE_URL=file:/app/prisma/data/prod.db
      - NODE_ENV=production
      # These are interpolated from the VPS .env; the app requires JWT_SECRET in prod.
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    volumes:
      # Mount a local directory to persist the SQLite database
      - ./prisma/data:/app/prisma/data
    labels:
      - "traefik.enable=true"
      # Route for eduexpressint.com and www.eduexpressint.com
      - "traefik.http.routers.edxbd.rule=Host(`eduexpressint.com`) || Host(`www.eduexpressint.com`)"
      - "traefik.http.routers.edxbd.entrypoints=websecure"
      - "traefik.http.routers.edxbd.tls.certresolver=letsencrypt" # Assumes Let's Encrypt resolver is named 'letsencrypt' in Traefik setup
      # Port configuration
      - "traefik.http.services.edxbd.loadbalancer.server.port=3000"
      # Canonical host: 301 redirect www -> non-www at the edge ($$ escapes $ for compose)
      - "traefik.http.middlewares.edxbd-www.redirectregex.regex=^https?://www\\.eduexpressint\\.com/(.*)"
      - "traefik.http.middlewares.edxbd-www.redirectregex.replacement=https://eduexpressint.com/$${1}"
      - "traefik.http.middlewares.edxbd-www.redirectregex.permanent=true"
      - "traefik.http.routers.edxbd.middlewares=edxbd-www"
      # --- Force HTTP (port 80) → HTTPS. This is the fix for the browser
      #     "Not Secure" warning: without it the site is served in cleartext
      #     on port 80 and never upgraded. 'web' is the Hostinger Traefik
      #     template's port-80 entrypoint; rename if your Traefik differs.
      - "traefik.http.routers.edxbd-http.rule=Host(`eduexpressint.com`) || Host(`www.eduexpressint.com`)"
      - "traefik.http.routers.edxbd-http.entrypoints=web"
      - "traefik.http.routers.edxbd-http.middlewares=edxbd-https-redirect"
      - "traefik.http.middlewares.edxbd-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.edxbd-https-redirect.redirectscheme.permanent=true"
    networks:
      - traefik-net

networks:
  traefik-net:
    external: true
    # Your Hostinger VPS template likely uses an external network for Traefik.
    # If the network name is different, change it here (e.g., 'proxy' or 'web').
